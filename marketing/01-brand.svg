<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#252535"/>
      <stop offset="100%" stop-color="#16161a"/>
    </radialGradient>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ececea" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ececea" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#16161a"/>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle horizontal rule lines — very faint grid feel -->
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#ececea" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#ececea" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#ececea" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#ececea" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Ghost brand mark — top-left corner, large & very faint -->
  <g opacity="0.045">
    <rect x="-60" y="48" width="320" height="18" rx="9" fill="#ececea"/>
    <rect x="36"  y="88" width="224" height="18" rx="9" fill="#ececea"/>
    <rect x="128" y="128" width="132" height="18" rx="9" fill="#ececea"/>
  </g>

  <!-- Ghost brand mark — bottom-right corner, large & very faint -->
  <g opacity="0.045">
    <rect x="820" y="934" width="320" height="18" rx="9" fill="#ececea"/>
    <rect x="916" y="974" width="224" height="18" rx="9" fill="#ececea"/>
    <rect x="1008" y="1014" width="132" height="18" rx="9" fill="#ececea"/>
  </g>

  <!--
    Brand mark — 126 px wide
    scale = 126 / 18 = 7
    line-h = 2*7 = 14,  gap = 3*7 = 21
    line-2: x = 5.4*7 = 37.8 ≈ 38,  w = 12.6*7 = 88.2 ≈ 88
    line-3: x = 10.5*7 = 73.5 ≈ 74,  w = 7.5*7 = 52.5 ≈ 52
    total-h = 21+14+21+14 = 70  (y: 0→14, 35→49, 70→84)
    center-x at 540 → translate-x = 540 − 63 = 477
    visual center of mark at ~42 → translate-y = 400 − 42 = 358
  -->
  <g transform="translate(477, 358)">
    <rect x="0"  y="0"  width="126" height="14" rx="7" fill="#ececea" opacity="0.90"/>
    <rect x="38" y="35" width="88"  height="14" rx="7" fill="#ececea" opacity="0.62"/>
    <rect x="74" y="70" width="52"  height="14" rx="7" fill="#ececea" opacity="0.38"/>
  </g>

  <!-- "Threaded" wordmark -->
  <text
    x="540" y="556"
    font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="92" font-weight="700" letter-spacing="-3.8"
    fill="#ececea" text-anchor="middle">Threaded</text>

  <!-- Tagline -->
  <text
    x="540" y="618"
    font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="27" font-weight="400" letter-spacing="-0.3"
    fill="#7e7e7c" text-anchor="middle">Every idea deserves a place to grow.</text>

  <!-- CTA button -->
  <rect x="362" y="672" width="356" height="64" rx="14" fill="#ececea"/>
  <text
    x="540" y="713"
    font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="23" font-weight="600" letter-spacing="-0.5"
    fill="#16161a" text-anchor="middle">Start writing →</text>

  <!-- Bottom domain hint -->
  <text
    x="540" y="990"
    font-family="'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="17" font-weight="400" letter-spacing="0.06em"
    fill="#3a3a43" text-anchor="middle">threaded.app</text>
</svg>
