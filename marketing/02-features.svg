<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">

  <!-- Background -->
  <rect width="1080" height="1080" fill="#f6f6f5"/>

  <!-- Top header -->
  <text
    x="540" y="112"
    font-family="'JetBrains Mono', 'Fira Mono', ui-monospace, monospace"
    font-size="12" font-weight="500" letter-spacing="0.14em"
    fill="#8a8884" text-anchor="middle">BUILT FOR DEPTH</text>

  <text
    x="540" y="172"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-size="54" font-weight="700" letter-spacing="-2.2"
    fill="#1a1a1a" text-anchor="middle">Everything your ideas need</text>

  <!--
    Card grid — 2 columns, 3 rows (2 + 2 + 1 centered)
    Column A: x=60,   Column B: x=556
    Card width: 464,  Card height: 200
    Row 1: y=210,  Row 2: y=428,  Row 3 (centered): y=646
    Padding inside card: 26px
    Icon box: 44×44, rx=11, at (card_x+26, card_y+26)
    Icon centered in box: icon offset = box_origin + 12 (for 20px icon)
    Title: y = card_y + 100
    Desc:  y = card_y + 128  (tspan dy=21)
  -->

  <!-- ── Card 1: Threading ── -->
  <rect x="60" y="210" width="464" height="200" rx="14" fill="#ffffff" stroke="#e6e4e0" stroke-width="1"/>
  <!-- icon box -->
  <rect x="86" y="236" width="44" height="44" rx="11" fill="#f0efed"/>
  <!-- threading icon: cascading lines + dots -->
  <g transform="translate(98, 248)" fill="none" stroke="#5b5b58" stroke-width="1.5" stroke-linecap="round">
    <line x1="0" y1="3"  x2="12" y2="3"/>
    <line x1="2" y1="10" x2="14" y2="10"/>
    <line x1="4" y1="17" x2="16" y2="17"/>
    <circle cx="14.5" cy="3"  r="2.2" fill="#5b5b58" stroke="none"/>
    <circle cx="16.5" cy="10" r="2.2" fill="#5b5b58" stroke="none"/>
    <circle cx="18.5" cy="17" r="2.2" fill="#5b5b58" stroke="none"/>
  </g>
  <text x="86" y="310" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.4" fill="#1a1a1a">Threading</text>
  <text x="86" font-family="'Inter', system-ui, sans-serif" font-size="13.5" fill="#5b5b58">
    <tspan x="86" y="338">Branch any thought into a deeper</tspan>
    <tspan x="86" dy="21">conversation. Ideas connect and grow</tspan>
    <tspan x="86" dy="21">without losing context.</tspan>
  </text>

  <!-- ── Card 2: Tags ── -->
  <rect x="556" y="210" width="464" height="200" rx="14" fill="#ffffff" stroke="#e6e4e0" stroke-width="1"/>
  <rect x="582" y="236" width="44" height="44" rx="11" fill="#f0efed"/>
  <!-- tag icon -->
  <g transform="translate(593, 247)" fill="none" stroke="#5b5b58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 0 L11 0 L20 9 L11 18 L0 18 Z"/>
    <circle cx="4.5" cy="9" r="2" fill="#5b5b58" stroke="none"/>
  </g>
  <text x="582" y="310" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.4" fill="#1a1a1a">Tags</text>
  <text x="582" font-family="'Inter', system-ui, sans-serif" font-size="13.5" fill="#5b5b58">
    <tspan x="582" y="338">Label thoughts effortlessly. Filter</tspan>
    <tspan x="582" dy="21">your feed in one click — the right</tspan>
    <tspan x="582" dy="21">idea is always one tag away.</tspan>
  </text>

  <!-- ── Card 3: Search & Filter ── -->
  <rect x="60" y="428" width="464" height="200" rx="14" fill="#ffffff" stroke="#e6e4e0" stroke-width="1"/>
  <rect x="86" y="454" width="44" height="44" rx="11" fill="#f0efed"/>
  <!-- search icon -->
  <g transform="translate(97, 465)" fill="none" stroke="#5b5b58" stroke-width="1.5" stroke-linecap="round">
    <circle cx="9" cy="9" r="7.5"/>
    <line x1="14.3" y1="14.3" x2="21" y2="21"/>
    <line x1="5" y1="9" x2="13" y2="9"/>
    <line x1="5" y1="6" x2="10" y2="6"/>
    <line x1="5" y1="12" x2="11" y2="12"/>
  </g>
  <text x="86" y="528" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.4" fill="#1a1a1a">Search &amp; Filter</text>
  <text x="86" font-family="'Inter', system-ui, sans-serif" font-size="13.5" fill="#5b5b58">
    <tspan x="86" y="556">Find any thought in seconds. Search</tspan>
    <tspan x="86" dy="21">by text, filter by date or tags —</tspan>
    <tspan x="86" dy="21">nothing stays buried.</tspan>
  </text>

  <!-- ── Card 4: Spaces ── -->
  <rect x="556" y="428" width="464" height="200" rx="14" fill="#ffffff" stroke="#e6e4e0" stroke-width="1"/>
  <rect x="582" y="454" width="44" height="44" rx="11" fill="#f0efed"/>
  <!-- spaces icon: 2×2 grid -->
  <g transform="translate(593, 465)" fill="none" stroke="#5b5b58" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0"  y="0"  width="9" height="9" rx="2.5"/>
    <rect x="13" y="0"  width="9" height="9" rx="2.5"/>
    <rect x="0"  y="13" width="9" height="9" rx="2.5"/>
    <rect x="13" y="13" width="9" height="9" rx="2.5"/>
  </g>
  <text x="582" y="528" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.4" fill="#1a1a1a">Spaces</text>
  <text x="582" font-family="'Inter', system-ui, sans-serif" font-size="13.5" fill="#5b5b58">
    <tspan x="582" y="556">Separate contexts for work, projects,</tspan>
    <tspan x="582" dy="21">or personal life. Each space is its</tspan>
    <tspan x="582" dy="21">own focused world.</tspan>
  </text>

  <!-- ── Card 5: Light & Dark Mode (centered) ── -->
  <rect x="308" y="646" width="464" height="200" rx="14" fill="#ffffff" stroke="#e6e4e0" stroke-width="1"/>
  <rect x="334" y="672" width="44" height="44" rx="11" fill="#f0efed"/>
  <!-- sun icon -->
  <g transform="translate(345, 683)" fill="none" stroke="#5b5b58" stroke-width="1.5" stroke-linecap="round">
    <circle cx="11" cy="11" r="4.5"/>
    <line x1="11" y1="0"   x2="11" y2="3.5"/>
    <line x1="11" y1="18.5" x2="11" y2="22"/>
    <line x1="0"   y1="11" x2="3.5" y2="11"/>
    <line x1="18.5" y1="11" x2="22" y2="11"/>
    <line x1="3.2" y1="3.2"   x2="5.6" y2="5.6"/>
    <line x1="16.4" y1="16.4" x2="18.8" y2="18.8"/>
    <line x1="3.2" y1="18.8"  x2="5.6" y2="16.4"/>
    <line x1="16.4" y1="5.6"  x2="18.8" y2="3.2"/>
  </g>
  <text x="334" y="746" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="600" letter-spacing="-0.4" fill="#1a1a1a">Light &amp; Dark Mode</text>
  <text x="334" font-family="'Inter', system-ui, sans-serif" font-size="13.5" fill="#5b5b58">
    <tspan x="334" y="774">A theme that matches your mood —</tspan>
    <tspan x="334" dy="21">crisp and clean in daylight, restful</tspan>
    <tspan x="334" dy="21">and focused at night.</tspan>
  </text>

  <!-- Footer branding -->
  <!--
    Brand mark 22px wide, scale=22/18=1.222
    line-h=2.4≈2, gap=3.7≈4
    line-2: x=6.6≈7, w=15.4≈15
    line-3: x=12.8≈13, w=9.2≈9
    total h=14
    Wordmark: mark(22px) + gap(8) + text(~90px at 16px bold) ≈ 120px
    center at 540: start mark at 480
  -->
  <g transform="translate(480, 918)">
    <rect x="0"  y="0"  width="22" height="2" rx="1" fill="#8a8884" opacity="0.9"/>
    <rect x="7"  y="7"  width="15" height="2" rx="1" fill="#8a8884" opacity="0.65"/>
    <rect x="13" y="14" width="9"  height="2" rx="1" fill="#8a8884" opacity="0.4"/>
  </g>
  <text
    x="509" y="931"
    font-family="'Inter', system-ui, sans-serif"
    font-size="16" font-weight="600" letter-spacing="-0.2"
    fill="#8a8884">Threaded</text>
  <text
    x="540" y="960"
    font-family="'Inter', system-ui, sans-serif"
    font-size="13" fill="#b1afaa" text-anchor="middle">A quiet place to go deep.</text>

</svg>
