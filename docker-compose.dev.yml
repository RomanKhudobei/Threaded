services:
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - threaded-frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  threaded-frontend-node-modules:
