services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      THREADED_DATABASE_PATH: /data/threaded.sqlite3
    volumes:
      - threaded-data:/data

  frontend:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  threaded-data:
